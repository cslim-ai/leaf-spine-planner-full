<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <base href="../" />
    <title>Leaf-Spine Browser Smoke Test</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <form id="networkForm" class="panel inputs">
      <input id="serverCount" value="8" />
      <input id="serverNicPorts" value="8" />
      <input id="serverLinkSpeed" value="400" />
      <input id="useCustomSwitchCounts" type="checkbox" />
      <input id="customLeafCount" value="2" />
      <input id="customSpineCount" value="2" />
      <input id="switchPorts" value="64" />
      <input id="leafMinSparePorts" value="0" />
      <input id="switchLinkSpeed" value="400" />
      <input id="useTwinPort" type="checkbox" />
      <input id="spineSameAsLeaf" type="checkbox" checked />
      <input id="spineSwitchPorts" value="64" />
      <input id="spineSwitchLinkSpeed" value="400" />
      <input id="spineUseTwinPort" type="checkbox" />
      <input id="disableUplinkTwinPort" type="checkbox" />
      <input id="targetOversub" value="3" />
      <input id="useMultiPlanar" type="checkbox" />
      <input id="useMultiPods" type="checkbox" />
      <input id="podServerCount" value="64" />
      <input type="radio" name="topologyMode" value="nonblocking" checked />
      <input type="radio" name="topologyMode" value="oversubscribed" />
    </form>
    <div id="oversubField"></div>
    <div id="podField"></div>
    <span id="twinPortLabel"></span>
    <span id="spineTwinPortLabel"></span>
    <small id="nodeTwinPortNotice" class="hidden"></small>
    <select id="languageSelect">
      <option value="ko">한국어</option>
      <option value="en">English</option>
    </select>
    <span id="leafCount"></span>
    <span id="spineCount"></span>
    <span id="oversubRatio"></span>
    <span id="totalSwitches"></span>
    <dl id="detailList"></dl>
    <span id="calculationStatus" class="hidden"></span>
    <p id="message"></p>
    <div id="diagram"></div>
    <p id="diagramCaption"></p>
    <button id="viewFull" type="button"></button>
    <button id="viewWrapped" type="button"></button>
    <button id="viewSummary" type="button"></button>
    <button id="openDiagramWindow" type="button"></button>
    <button id="zoomIn" type="button"></button>
    <button id="zoomOut" type="button"></button>
    <button id="zoomReset" type="button"></button>
    <button id="zoomCenter" type="button"></button>
    <button id="zoomFit" type="button"></button>
    <div id="topologyExportMenu">
      <button id="exportDiagram" type="button"></button>
      <div>
        <button type="button" data-export-value="svg"></button>
        <button type="button" data-export-value="png"></button>
        <button type="button" data-export-value="ppt"></button>
      </div>
    </div>
    <button id="openPortMapWindow" type="button"></button>
    <div id="reportExportMenu">
      <button id="exportPdf" type="button"></button>
      <div>
        <button type="button" data-export-value="svg"></button>
        <button type="button" data-export-value="pdf"></button>
      </div>
    </div>
    <div id="inputTransferMenu" class="hidden">
      <button id="importExportInputs" class="reset-inputs" type="button"></button>
      <div>
        <button type="button" data-export-value="export-json"></button>
        <button type="button" data-export-value="import-json"></button>
      </div>
    </div>
    <input id="importInputsFile" type="file" />
    <button id="resetInputs" class="reset-inputs" type="button"></button>
    <pre id="result">running</pre>

    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/calculator.js"></script>
    <script src="assets/js/result-details.js"></script>
    <script src="assets/js/input-state.js"></script>
    <script src="assets/js/export-utils.js"></script>
    <script src="assets/js/diagram.js"></script>
    <script src="assets/js/diagram-geometry.js"></script>
    <script src="assets/js/diagram-api.js"></script>
    <script src="assets/js/report-api.js"></script>
    <script src="assets/js/portmap.js"></script>
    <script src="assets/js/portmap-api.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
      (async () => {
        const checks = [];
        function assert(condition, message) {
          if (!condition) throw new Error(message);
          checks.push(message);
        }

        assert(typeof LeafSpineCalculator.calculate === "function", "calculator namespace is available");
        assert(typeof LeafSpineDiagram.exportSvg === "function", "diagram namespace is available");
        assert(typeof LeafSpineReport.makeSvg === "function", "report namespace is available");
        assert(typeof LeafSpinePortMap.build === "function", "port map namespace is available");
        assert(document.querySelector("#importExportInputs"), "import/export inputs button is available");
        assert(document.querySelector("#inputTransferMenu").classList.contains("hidden"), "import/export inputs button is hidden while logic remains available");
        assert(
          Boolean(document.querySelector("#useMultiPlanar").compareDocumentPosition(document.querySelector("#importExportInputs")) & Node.DOCUMENT_POSITION_FOLLOWING),
          "form action buttons follow dynamic configuration rows in DOM order"
        );
        document.querySelector("#useMultiPlanar").checked = true;
        document.querySelector("#useMultiPlanar").dispatchEvent(new Event("change", { bubbles: true }));
        assert(document.querySelector("#importExportInputs"), "import/export button DOM remains after multi-planar toggle");
        const segmented = document.querySelector(".segmented");
        const oversubInput = document.querySelector("input[name='topologyMode'][value='oversubscribed']");
        const segmentedRect = segmented.getBoundingClientRect();
        const oversubRect = oversubInput.getBoundingClientRect();
        assert(
          oversubRect.left >= segmentedRect.left &&
            oversubRect.right <= segmentedRect.right &&
            oversubRect.top >= segmentedRect.top &&
            oversubRect.bottom <= segmentedRect.bottom,
          "oversubscribed radio hit area stays inside the segmented control"
        );
        assert(currentResult && currentResult.feasible, "default calculation is feasible");
        assert(document.querySelector("#diagram svg"), "diagram SVG rendered");

        const reportSvg = await LeafSpineReport.makeSvg("2026-05-30 00:00:00");
        assert(reportSvg.includes('width="1320"') && reportSvg.includes('height="1867"'), "report SVG keeps A4 portrait ratio");

        const portMap = LeafSpinePortMap.build(currentResult);
        assert(portMap.serverLeafRows.length === 64, "node-leaf port map rows generated");
        assert(portMap.leafSpineRows.length > 0, "leaf-spine port map rows generated");
        const xlsxBlob = await LeafSpinePortMap.buildXlsx(portMap);
        assert(xlsxBlob.size > 0, "port map XLSX blob generated");

        await LeafSpineExportUtils.ensurePptxGenLoaded();
        await LeafSpineExportUtils.ensureDiagramPptxExportLoaded();
        const topologyPptx = buildPptxWithPptxGen(currentResult, "summary");
        const topologyBlob = await topologyPptx.write({ outputType: "blob", compression: true });
        assert(topologyBlob.size > 0, "topology PPTX blob generated");
        const portMapPptx = await LeafSpinePortMap.buildPptx(portMap, "2026-05-30 00:00:00");
        const portMapBlob = await portMapPptx.write({ outputType: "blob" });
        assert(portMapBlob.size > 0, "port map PPTX blob generated");

        document.querySelector("#result").textContent = "PASS\n" + checks.join("\n");
        document.documentElement.dataset.testStatus = "pass";
      })().catch((error) => {
        document.querySelector("#result").textContent = "FAIL\n" + error.stack;
        document.documentElement.dataset.testStatus = "fail";
      });
    </script>
  </body>
</html>
